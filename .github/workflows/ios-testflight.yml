name: iOS — TestFlight

on:
  push:
    branches: [master, main, "release*", "beta*"]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import code signing certificate
        env:
          BUILD_CERT_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        shell: bash
        run: |
          set -x
          KEYCHAIN_PATH="$RUNNER_TEMP/ci-signing.keychain-db"

          echo "$BUILD_CERT_BASE64" | base64 --decode > /tmp/cert.p12
          echo "Decode exit: $?"
          file /tmp/cert.p12

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -A
          echo "Import exit: $?"

          security set-key-partition-list -S "apple-tool:,apple:,codesign:" -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          echo "=== Identities in keychain ==="
          security find-identity -v -p codesigning

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        shell: bash
        run: |
          set -x
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROVISION_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          wc -c /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision
          cp /tmp/profile.mobileprovision "$PROFILE_DIR/d9cbe5c8-9a39-43a0-b383-4bb58e9c8ad9.mobileprovision"
          ls -la "$PROFILE_DIR/"

      - name: 🔍 Debug - resolve xcodebuild settings
        run: |
          xcodebuild -version
          echo "=== Show how xcodebuild resolves signing ==="
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -showBuildSettings 2>&1 | grep -E "PROVISIONING_PROFILE|CODE_SIGN_IDENTITY|DEVELOPMENT_TEAM|PRODUCT_BUNDLE_IDENTIFIER"

      - name: 📄 Generate Export Options
        run: |
          python3 -c "
import plistlib
opts = {
    'method': 'app-store',
    'teamID': 'H4VQ9X6KYK',
    'provisioningProfiles': {'com.sakurasensei.app': 'Sakura Sensei App Store'},
}
plistlib.dump(opts, open('/tmp/export-options.plist', 'wb'))
"

      - name: 🏗️ Build & Sign IPA
        run: |
          flutter build ipa --release \
            --export-method=app-store \
            --export-options-plist=/tmp/export-options.plist \
            --build-number=${GITHUB_RUN_NUMBER}

      - name: 🚀 Upload to TestFlight
        env:
          ASC_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          ASC_PASSWORD: ${{ secrets.APP_STORE_CONNECT_PASSWORD }}
        shell: bash
        run: |
          set -x
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "No IPA found!"
            ls -la build/ios/ipa/ 2>/dev/null || echo "No build/ios/ipa dir"
            exit 1
          fi
          echo "Uploading $IPA ($(wc -c < "$IPA") bytes) ..."

          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            -u "$ASC_USERNAME" \
            -p "$ASC_PASSWORD"
