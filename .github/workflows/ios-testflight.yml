name: iOS — TestFlight

on:
  push:
    branches: [master, main, "release*", "beta*"]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import code signing certificate
        env:
          BUILD_CERT_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        shell: bash
        run: |
          set -x
          KEYCHAIN_PATH="$RUNNER_TEMP/ci-signing.keychain-db"

          echo "$BUILD_CERT_BASE64" | head -c 80
          echo ""
          echo "$BUILD_CERT_BASE64" | base64 --decode > /tmp/cert.p12 2>&1
          echo "Decode exit: $?"
          ls -la /tmp/cert.p12
          file /tmp/cert.p12

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -A 2>&1
          echo "Import exit: $?"

          security set-key-partition-list -S "apple-tool:,apple:,codesign:" -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        shell: bash
        run: |
          set -x
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROVISION_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          echo "=== Decoded size ==="
          wc -c /tmp/profile.mobileprovision
          echo "=== Verify with security cms ==="
          security cms -D -i /tmp/profile.mobileprovision || true
          cp /tmp/profile.mobileprovision "$PROFILE_DIR/d9cbe5c8-9a39-43a0-b383-4bb58e9c8ad9.mobileprovision"
          echo "=== Installed profiles ==="
          ls -la "$PROFILE_DIR/"

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version -sdk iphoneos

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --export-method=app-store \
            --build-number=${GITHUB_RUN_NUMBER} \
            --xcode-build-args="PROVISIONING_PROFILE_SPECIFIER='Sakura Sensei App Store' PROVISIONING_PROFILE_UUID=d9cbe5c8-9a39-43a0-b383-4bb58e9c8ad9"

      - name: Upload to TestFlight
        env:
          ASC_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          ASC_PASSWORD: ${{ secrets.APP_STORE_CONNECT_PASSWORD }}
        shell: bash
        run: |
          set -x
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "No IPA found!"
            ls -la build/ios/ipa/ 2>/dev/null || echo "No build/ios/ipa dir"
            exit 1
          fi
          echo "Uploading $IPA ($(wc -c < "$IPA") bytes) ..."

          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            -u "$ASC_USERNAME" \
            -p "$ASC_PASSWORD"
