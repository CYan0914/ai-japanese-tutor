name: iOS — TestFlight

on:
  push:
    branches: [master, main, "release*", "beta*"]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import code signing certificate
        env:
          BUILD_CERT_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN="ci-signing.keychain-db"
          KEYCHAIN_PATH="$RUNNER_TEMP/$KEYCHAIN"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          echo "$BUILD_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISION_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROVISION_BASE64" | base64 --decode > "$PROFILE_DIR/ci.mobileprovision"

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version -sdk iphoneos

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --export-method=app-store \
            --build-number=${GITHUB_RUN_NUMBER}

      - name: Upload to TestFlight
        env:
          ASC_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          ASC_PASSWORD: ${{ secrets.APP_STORE_CONNECT_PASSWORD }}
        run: |
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Uploading $IPA ..."

          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            -u "$ASC_USERNAME" \
            -p "$ASC_PASSWORD" \
            --verbose 2>&1 || {
              echo "altool failed — trying iTMSTransporter..."
              xcrun iTMSTransporter -m upload \
                -f "$IPA" \
                -u "$ASC_USERNAME" \
                -p "$ASC_PASSWORD"
            }
